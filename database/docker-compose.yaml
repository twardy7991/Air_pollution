services:
  pollution_db: 
    image: postgres:16.1
    container_name: pollution_db
    volumes:
     - ./initdb:/docker-entrypoint-initdb.d:ro
    # - ./postgresql:/var/lib/postgresql/data
    environment:
     POSTGRES_PASSWORD: postgres
     POSTGRES_USER: postgres
     POSTGRES_DB: pollution_db
    networks:
     - db_pollution_network

networks:
  db_pollution_network:
    external: true
    
     